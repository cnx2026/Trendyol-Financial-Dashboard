 "FTE Diff", xls_total_fee: "Total Fee", xls_fee_diff: "Fee Diff", opt_all_periods: "ALL (Cumulative)"
            }

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentView = 'ops';
        let currentLang = 'tr';
        let rawData = []; 
        let hierarchyData = []; 
        let advisorData = []; 

        document.addEventListener('DOMContentLoaded', async () => {
            const savedLang = localStorage.getItem('appLang');
            if(savedLang) changeLanguage(savedLang);
            else changeLanguage('tr');

            const savedTheme = localStorage.getItem('appTheme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                updateThemeIcon(true);
            } else {
                document.documentElement.classList.remove('dark');
                updateThemeIcon(false);
            }

            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                showDashboard(session.user);
            } else {
                showLogin();
            }
        });

        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('appTheme', 'light');
                updateThemeIcon(false);
            } else {
                html.classList.add('dark');
                localStorage.setItem('appTheme', 'dark');
                updateThemeIcon(true);
            }
        }

        function updateThemeIcon(isDark) {
            const icon = document.getElementById('themeIcon');
            if (icon) {
                icon.className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
            }
        }

        function t(key) {
            return translations[currentLang][key] || key;
        }

        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('appLang', lang);
            // ... (Buton güncelleme kodları aynı) ...
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(translations[lang][key]) {
                    el.innerText = translations[lang][key];
                }
            });
            // ... (Placeholder güncellemeleri aynı) ...
            if(rawData.length > 0) {
                populateFilters();
                applyFilters();
            }
        }

        // ... (Login/Logout fonksiyonları aynı) ...

        async function showDashboard(user) {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            
            if (user && user.email) {
                const email = user.email;
                let formattedName = "";
                const namePart = email.split('@')[0];
                formattedName = namePart.split('.').map(n => n.charAt(0).toUpperCase() + n.slice(1)).join(' ');
                const avatarUrl = `https://ui-avatars.com/api/?name=${formattedName}&background=random&color=fff&size=128`;
                document.getElementById('userName').innerText = formattedName;
                document.getElementById('userAvatar').src = avatarUrl;
            }

            await populatePeriodSelector();
            switchView('ops');
        }

        // --- DATA FETCHING & PERIOD MANAGEMENT ---
        async function populatePeriodSelector() {
            const selector = document.getElementById('periodSelector');
            const { data, error } = await _supabase.from('view_advisor_performance').select('period', { count: 'exact', head: false });

            if (error) {
                console.error("Error fetching periods:", error);
                selector.innerHTML = `<option>Hata</option>`;
                return;
            }

            const periods = [...new Set(data.map(item => item.period))].filter(Boolean).sort().reverse();
            
            // YENİ: "Tümü" seçeneğini en başa ekle
            let optionsHtml = `<option value="all">${t('opt_all_periods')}</option>`;
            optionsHtml += periods.map(p => `<option value="${p}">${p}</option>`).join('');
            
            selector.innerHTML = optionsHtml;
        }

        function handlePeriodChange() {
            fetchData();
        }

        async function fetchHierarchyData(period) {
            let query = _supabase.from('view_advisor_performance')
                .select('senior_manager, operation_manager, team_leader, channel_name');
            
            // Eğer "Tümü" seçili değilse filtrele
            if (period !== 'all') {
                query = query.eq('period', period);
            }

            const { data, error } = await query;
            
            if (error) {
                console.error("Hierarchy fetch error:", error);
                hierarchyData = [];
            } else {
                hierarchyData = data;
            }
        }

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${view}`).classList.add('active');
            
            const titles = { 'ops': 'title_ops', 'leader': 'title_leader', 'channel': 'title_channel' };
            document.getElementById('pageTitle').innerText = t(titles[view]);
            
            const placeholders = { 'ops': 'search_ops', 'leader': 'search_leader', 'channel': 'search_channel' };
            document.getElementById('searchInput').placeholder = t(placeholders[view]);
            
            fetchData();
        }

        async function fetchData() {
            document.getElementById('tableBody').innerHTML = `<tr><td colspan="8" class="p-12 text-center text-slate-400 dark:text-slate-500"><i class="fa-solid fa-circle-notch fa-spin fa-2x mb-3"></i><br>${t('loading_data')}</td></tr>`;
            
            const selectedPeriod = document.getElementById('periodSelector').value;
            
            await fetchHierarchyData(selectedPeriod);

            let tableName = '';
            if (currentView === 'ops') tableName = 'view_operations_performance';
            else if (currentView === 'leader') tableName = 'view_leader_performance';
            else tableName = 'view_channel_performance';

            let query = _supabase.from(tableName).select('*');
            
            // Eğer "Tümü" seçili değilse filtrele
            if (selectedPeriod !== 'all') {
                query = query.eq('period', selectedPeriod);
            }

            const { data, error } = await query;
            
            if (error) { 
                if(error.code === 'PGRST301' || error.message.includes('JWT')) { handleLogout(); return; }
                alert('Veri çekme hatası.'); return; 
            }

            // YENİ: Eğer "Tümü" seçiliyse, verileri JS tarafında topla (Aggregate)
            if (selectedPeriod === 'all') {
                rawData = aggregateData(data);
            } else {
                rawData = data;
            }

            populateFilters(); 
            applyFilters(); 
        }

        // YENİ: Verileri birleştirme fonksiyonu (Kümülatif için)
        function aggregateData(data) {
            const grouped = {};
            
            data.forEach(row => {
                // Gruplama anahtarını belirle (View'a göre değişir)
                let key = '';
                if (currentView === 'ops') key = row.manager_name;
                else if (currentView === 'leader') key = row.leader_name;
                else key = row.channel_name;

                if (!grouped[key]) {
                    // İlk kaydı kopyala (İsimler vb. için)
                    grouped[key] = { ...row };
                    // Sayısal değerleri sıfırla (Toplama başlayacağız)
                    grouped[key].total_clean_hours = 0;
                    grouped[key].produced_fte = 0;
                    grouped[key].forecast_fte = 0;
                    grouped[key].total_fee = 0;
                    grouped[key].fee_diff = 0;
                }

                // Değerleri topla
                grouped[key].total_clean_hours += parseFloat(row.total_clean_hours || 0);
                grouped[key].produced_fte += parseFloat(row.produced_fte || 0);
                grouped[key].forecast_fte += parseFloat(row.forecast_fte || 0);
                grouped[key].total_fee += parseFloat(row.total_fee || 0);
                grouped[key].fee_diff += parseFloat(row.fee_diff || 0);
            });

            // Objeden diziye çevir
            return Object.values(grouped);
        }

        // ... (Filtreleme ve Render fonksiyonları aynı kalacak) ...
        // ... (Sadece renderData içinde ufak bir değişiklik gerekebilir ama mevcut haliyle de çalışır) ...
        
        // --- FILTER LOGIC ---
        function getUniqueValues(data, key) {
            return [...new Set(data.map(item => item[key]))].filter(x => x);
        }

        function populateFilters() {
            const seniorSelect = document.getElementById('filterSenior');
            const seniors = getUniqueValues(hierarchyData, 'senior_manager').sort();
            
            const currentVal = seniorSelect.value;
            seniorSelect.innerHTML = `<option value="all">${t('all')}</option>` + seniors.map(s => `<option value="${s}">${s}</option>`).join('');
            if (seniors.includes(currentVal)) seniorSelect.value = currentVal;
            else seniorSelect.value = 'all';
            
            handleSeniorChange();
        }

        function handleSeniorChange() {
            const smVal = document.getElementById('filterSenior').value;
            const managerSelect = document.getElementById('filterManager');
            
            let filteredHierarchy = hierarchyData;
            if (smVal !== 'all') {
                filteredHierarchy = filteredHierarchy.filter(item => item.senior_manager === smVal);
            }

            const managers = getUniqueValues(filteredHierarchy, 'operation_manager').sort();
            
            managerSelect.innerHTML = `<option value="all">${t('all')}</option>` + managers.map(m => `<option value="${m}">${m}</option>`).join('');
            managerSelect.value = 'all';
            
            handleManagerChange();
        }

        function handleManagerChange() {
            const smVal = document.getElementById('filterSenior').value;
            const managerVal = document.getElementById('filterManager').value;
            const subFilter = document.getElementById('filterSub');
            
            if (currentView === 'ops') {
                subFilter.innerHTML = `<option value="all">${t('all')}</option>`;
                subFilter.disabled = true;
                applyFilters();
                return;
            }

            subFilter.disabled = false;
            
            let filteredHierarchy = hierarchyData;
            if (smVal !== 'all') {
                filteredHierarchy = filteredHierarchy.filter(item => item.senior_manager === smVal);
            }
            if (managerVal !== 'all') {
                filteredHierarchy = filteredHierarchy.filter(item => item.operation_manager === managerVal);
            }

            let subItems = [];
            if (currentView === 'leader') {
                subItems = getUniqueValues(filteredHierarchy, 'team_leader');
            } else if (currentView === 'channel') {
                subItems = getUniqueValues(filteredHierarchy, 'channel_name');
            }
            subItems.sort();

            subFilter.innerHTML = `<option value="all">${t('all')}</option>` + subItems.map(i => `<option value="${i}">${i}</option>`).join('');
            
            applyFilters();
        }

        function applyFilters() {
            const searchVal = document.getElementById('searchInput').value.toLowerCase();
            const smVal = document.getElementById('filterSenior').value;
            const managerVal = document.getElementById('filterManager').value;
            const subVal = document.getElementById('filterSub').value;
            
            let filteredData = rawData;

            let validTargets = null;

            if (smVal !== 'all' || managerVal !== 'all') {
                let hData = hierarchyData;
                if (smVal !== 'all') hData = hData.filter(i => i.senior_manager === smVal);
                if (managerVal !== 'all') hData = hData.filter(i => i.operation_manager === managerVal);

                if (currentView === 'leader') {
                    validTargets = new Set(hData.map(i => i.team_leader));
                } else if (currentView === 'channel') {
                    validTargets = new Set(hData.map(i => i.channel_name));
                } else if (currentView === 'ops') {
                    validTargets = new Set(hData.map(i => i.operation_manager));
                }
            }

            if (validTargets) {
                filteredData = filteredData.filter(row => {
                    const name = row.manager_name || row.leader_name || row.channel_name;
                    return validTargets.has(name);
                });
            }

            if (subVal !== 'all' && !document.getElementById('filterSub').disabled) {
                if (currentView === 'leader') filteredData = filteredData.filter(item => item.leader_name === subVal);
                else if (currentView === 'channel') filteredData = filteredData.filter(item => item.channel_name === subVal);
            }

            if (searchVal) {
                filteredData = filteredData.filter(item => {
                    const name = (item.manager_name || item.leader_name || item.channel_name || '').toLowerCase();
                    return name.includes(searchVal);
                });
            }
            renderData(filteredData);
        }

        function renderData(data) {
            const thead = document.getElementById('tableHeader');
            const tbody = document.getElementById('tableBody');
            const tfoot = document.getElementById('tableFooter');
            let headers = [];
            
            if (currentView === 'ops') headers = [t('th_om'), t('th_hours'), t('th_prod_fte'), t('th_fore_fte'), t('th_fte_diff'), t('th_fee'), t('th_fee_diff')];
            else if (currentView === 'leader') headers = [t('th_tl'), t('th_om'), t('th_hours'), t('th_prod_fte'), t('th_fore_fte'), t('th_fte_diff'), t('th_fee'), t('th_fee_diff')];
            else headers = [t('th_channel'), t('th_unit_price'), t('th_hours'), t('th_prod_fte'), t('th_fore_fte'), t('th_fte_diff'), t('th_fee'), t('th_fee_diff')];
            
            thead.innerHTML = headers.map(h => `<th class="px-6 py-4">${h}</th>`).join('');

            let html = '';
            let totals = { hours: 0, prodFte: 0, foreFte: 0, fee: 0, feeDiff: 0 };

            if (data.length === 0) {
                html = `<tr><td colspan="8" class="p-8 text-center text-slate-400 dark:text-slate-500">${t('no_data')}</td></tr>`;
            } else {
                data.forEach(row => {
                    let name = row.manager_name || row.leader_name || row.channel_name;
                    let manager = row.operation_manager || '-';
                    let hours = parseFloat(row.total_clean_hours || 0);
                    let prodFte = parseFloat(row.produced_fte || 0);
                    let foreFte = parseFloat(row.forecast_fte || 0);
                    let fteDiff = prodFte - foreFte; 
                    let fee = parseFloat(row.total_fee || 0);
                    let feeDiff = parseFloat(row.fee_diff || 0);
                    let unitPrice = row.unit_price || 0;

                    totals.hours += hours;
                    totals.prodFte += prodFte;
                    totals.foreFte += foreFte;
                    totals.fee += fee;
                    totals.feeDiff += feeDiff;

                    const fteClass = fteDiff >= 0 ? 'text-emerald-600 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-900/20' : 'text-rose-600 dark:text-rose-400 bg-rose-50 dark:bg-rose-900/20';
                    const feeClass = feeDiff >= 0 ? 'text-emerald-600 dark:text-emerald-400' : 'text-rose-600 dark:text-rose-400';

                    html += `<tr class="border-b border-slate-50 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition duration-150">
                        <td class="px-6 py-4 font-semibold text-slate-700 dark:text-slate-200 flex items-center gap-3">
                            <div class="w-2.5 h-2.5 rounded-full ${fteDiff >= 0 ? 'bg-emerald-500' : 'bg-rose-500'} shadow-sm"></div>${name}
                        </td>
                        ${currentView === 'leader' ? `<td class="px-6 py-4 text-slate-500 dark:text-slate-400 text-xs">${manager}</td>` : ''}
                        ${currentView === 'channel' ? `<td class="px-6 py-4 text-slate-500 dark:text-slate-400 text-xs">${formatMoney(unitPrice)}</td>` : ''}
                        <td class="px-6 py-4 text-slate-600 dark:text-slate-400">${hours.toFixed(1)}</td>
                        <td class="px-6 py-4 font-bold text-slate-800 dark:text-slate-200">${prodFte.toFixed(2)}</td>
                        <td class="px-6 py-4 text-slate-400 dark:text-slate-500">${foreFte.toFixed(2)}</td>
                        <td class="px-6 py-4"><span class="px-2.5 py-1 rounded-md text-xs font-bold ${fteClass}">${fteDiff.toFixed(2)}</span></td>
                        <td class="px-6 py-4 font-bold text-slate-800 dark:text-slate-200">${formatMoney(fee)}</td>
                        <td class="px-6 py-4 font-bold text-xs ${feeClass}">${formatMoney(feeDiff)}</td>
                    </tr>`;
                });
            }
            tbody.innerHTML = html;
            let footerHtml = `<td class="px-6 py-5 font-bold text-slate-800 dark:text-white">${t('total')}</td>`;
            if (currentView === 'leader') footerHtml += `<td></td>`;
            if (currentView === 'channel') footerHtml += `<td></td>`;
            footerHtml += `
                <td class="px-6 py-5 font-bold text-slate-800 dark:text-white">${totals.hours.toFixed(1)}</td>
                <td class="px-6 py-5 font-bold text-slate-800 dark:text-white">${totals.prodFte.toFixed(2)}</td>
                <td class="px-6 py-5 font-bold text-slate-800 dark:text-white">${totals.foreFte.toFixed(2)}</td>
                <td class="px-6 py-5 font-bold ${totals.prodFte - totals.foreFte >= 0 ? 'text-emerald-600 dark:text-emerald-400' : 'text-rose-600 dark:text-rose-400'}">${(totals.prodFte - totals.foreFte).toFixed(2)}</td>
                <td class="px-6 py-5 font-bold text-slate-800 dark:text-white">${formatMoney(totals.fee)}</td>
                <td class="px-6 py-5 font-bold ${totals.feeDiff >= 0 ? 'text-emerald-600 dark:text-emerald-400' : 'text-rose-600 dark:text-rose-400'}">${formatMoney(totals.feeDiff)}</td>
            `;
            tfoot.innerHTML = footerHtml;
            updateKPIs(totals);
            update3DChart(totals);
        }

        function updateKPIs(totals) {
            document.getElementById('kpi-total-fee').innerText = formatMoney(totals.fee);
            document.getElementById('kpi-produced-fte').innerText = totals.prodFte.toFixed(2);
            document.getElementById('kpi-hours').innerText = totals.hours.toFixed(1);
            const feeDiffEl = document.getElementById('kpi-fee-diff');
            const diff = totals.feeDiff;
            const icon = diff >= 0 ? '<i class="fa-solid fa-arrow-trend-up"></i>' : '<i class="fa-solid fa-arrow-trend-down"></i>';
            feeDiffEl.innerHTML = `${icon} ${formatMoney(Math.abs(diff))}`;
            feeDiffEl.className = `mt-2 text-xs font-bold ${diff >= 0 ? 'text-emerald-600 dark:text-emerald-400' : 'text-rose-600 dark:text-rose-400'}`;
            const percent = totals.foreFte > 0 ? (totals.prodFte / totals.foreFte) * 100 : 0;
            document.getElementById('kpi-target-percent').innerText = `%${percent.toFixed(1)}`;
            document.getElementById('kpi-target-percent').className = `text-3xl font-extrabold mt-1 ${percent >= 100 ? 'text-emerald-600 dark:text-emerald-400' : (percent >= 90 ? 'text-amber-500 dark:text-amber-400' : 'text-rose-600 dark:text-rose-400')}`;
        }

        function update3DChart(totals) {
            const remaining = Math.max(0, totals.foreFte - totals.prodFte);
            const achieved = Math.min(totals.prodFte, totals.foreFte);
            Highcharts.chart('targetDonutChart', {
                chart: { type: 'pie', options3d: { enabled: true, alpha: 45 }, backgroundColor: 'transparent', margin: [0, 0, 0, 0], spacing: [0, 0, 0, 0] },
                title: { text: null },
                plotOptions: { pie: { innerSize: '50%', depth: 35, dataLabels: { enabled: false }, states: { hover: { enabled: false } } } },
                credits: { enabled: false },
                series: [{ name: 'FTE', data: [{ name: t('chart_achieved'), y: achieved, color: '#10b981' }, { name: t('chart_remaining'), y: remaining, color: '#e2e8f0' }] }]
            });
        }

        function formatMoney(amount) {
            return new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY', maximumFractionDigits: 0 }).format(amount);
        }

        // --- EXCEL EXPORT LOGIC ---
        async function openExportModal() {
            document.getElementById('exportModal').classList.remove('hidden');
            const btn = document.getElementById('btnGenerate');
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> ${t('downloading')}`;

            const selectedPeriod = document.getElementById('periodSelector').value;
            
            // YENİ: Excel için de "Tümü" mantığı
            let query = _supabase.from('view_advisor_performance').select('*');
            if (selectedPeriod !== 'all') {
                query = query.eq('period', selectedPeriod);
            }
            
            const { data, error } = await query;
            if (error) { alert('Veri çekme hatası'); return; }
            advisorData = data;
            
            const sms = [...new Set(data.map(i => i.senior_manager))].filter(Boolean).sort();
            document.getElementById('expSenior').innerHTML = `<option value="all">${t('all')}</option>` + sms.map(m => `<option value="${m}">${m}</option>`).join('');
            
            updateExportFilters('sm'); 
            btn.disabled = false;
            btn.innerHTML = `<span>${t('download_excel')}</span><i class="fa-solid fa-download"></i>`;
        }

        function closeExportModal() { document.getElementById('exportModal').classList.add('hidden'); }

        function updateExportFilters(changedLevel) {
            const sm = document.getElementById('expSenior').value;
            const omSelect = document.getElementById('expManager');
            const tlSelect = document.getElementById('expLeader');
            const chSelect = document.getElementById('expChannel');

            let filtered = advisorData;

            if (changedLevel === 'sm') {
                if (sm !== 'all') filtered = filtered.filter(i => i.senior_manager === sm);
                const oms = [...new Set(filtered.map(i => i.operation_manager))].filter(Boolean).sort();
                omSelect.innerHTML = `<option value="all">${t('all')}</option>` + oms.map(m => `<option value="${m}">${m}</option>`).join('');
                omSelect.value = 'all'; 
            }

            const currentOM = omSelect.value;
            if (currentOM !== 'all') filtered = filtered.filter(i => i.operation_manager === currentOM);
            else if (sm !== 'all') filtered = filtered.filter(i => i.senior_manager === sm);

            const tls = [...new Set(filtered.map(i => i.team_leader))].filter(Boolean).sort();
            const chs = [...new Set(filtered.map(i => i.channel_name))].filter(Boolean).sort();

            tlSelect.innerHTML = `<option value="all">${t('all')}</option>` + tls.map(m => `<option value="${m}">${m}</option>`).join('');
            chSelect.innerHTML = `<option value="all">${t('all')}</option>` + chs.map(m => `<option value="${m}">${m}</option>`).join('');
        }

        async function generateExcel() {
            const reportLevel = document.getElementById('expLevel').value;
            const sm = document.getElementById('expSenior').value;
            const om = document.getElementById('expManager').value;
            const tl = document.getElementById('expLeader').value;
            const ch = document.getElementById('expChannel').value;
            const selectedPeriod = document.getElementById('periodSelector').value;

            let exportData = [];
            let sheetName = "Rapor";

            if (reportLevel === 'advisor') {
                sheetName = "Temsilci Detay";
                let filtered = advisorData; 
                if (sm !== 'all') filtered = filtered.filter(i => i.senior_manager === sm);
                if (om !== 'all') filtered = filtered.filter(i => i.operation_manager === om);
                if (tl !== 'all') filtered = filtered.filter(i => i.team_leader === tl);
                if (ch !== 'all') filtered = filtered.filter(i => i.channel_name === ch);

                exportData = filtered.map(row => ({
                    [t('xls_reg')]: row.cnx_reg_number, [t('xls_name')]: row.user_name, [t('xls_clean_hours')]: parseFloat(row.clean_working_time || 0), [t('xls_raw_fte')]: parseFloat(row.raw_fte || 0), [t('xls_fte')]: parseFloat(row.capped_fte || 0), [t('xls_tl')]: row.team_leader, [t('xls_om')]: row.operation_manager, [t('xls_sm')]: row.senior_manager, [t('xls_channel')]: row.channel_name
                }));
            } else {
                let tableName = '';
                if (reportLevel === 'leader') tableName = 'view_leader_performance';
                else if (reportLevel === 'channel') tableName = 'view_channel_performance';
                else if (reportLevel === 'manager') tableName = 'view_operations_performance';

                let query = _supabase.from(tableName).select('*');
                if (selectedPeriod !== 'all') {
                    query = query.eq('period', selectedPeriod);
                }
                const { data: summaryData, error } = await query;
                if (error) { alert('Rapor verisi çekilemedi.'); return; }

                let filtered = summaryData;
                
                // YENİ: Kümülatif veri için aggregation
                if (selectedPeriod === 'all') {
                    filtered = aggregateData(filtered);
                }
                
                let validTargets = null;
                
                if (reportLevel !== 'manager') {
                     let hierarchySource = advisorData; 
                     if (sm !== 'all') hierarchySource = hierarchySource.filter(i => i.senior_manager === sm);
                     if (om !== 'all') hierarchySource = hierarchySource.filter(i => i.operation_manager === om);
                     
                     if (reportLevel === 'leader') validTargets = new Set(hierarchySource.map(i => i.team_leader));
                     else if (reportLevel === 'channel') validTargets = new Set(hierarchySource.map(i => i.channel_name));
                }

                if (validTargets) {
                    if (reportLevel === 'leader') filtered = filtered.filter(i => validTargets.has(i.leader_name));
                    else if (reportLevel === 'channel') filtered = filtered.filter(i => validTargets.has(i.channel_name));
                } else {
                    if (sm !== 'all' && 'senior_manager' in filtered[0]) filtered = filtered.filter(i => i.senior_manager === sm);
                    if (om !== 'all') {
                        const omKey = reportLevel === 'manager' ? 'manager_name' : 'operation_manager';
                        if (omKey in filtered[0]) filtered = filtered.filter(i => i[omKey] === om);
                    }
                }

                if (reportLevel === 'leader') {
                    sheetName = "Takim Lideri Ozeti";
                    exportData = filtered.map(row => ({
                        [t('xls_tl')]: row.leader_name, [t('xls_om')]: row.operation_manager, [t('xls_clean_hours')]: parseFloat(row.total_clean_hours || 0), [t('xls_prod_fte')]: parseFloat(row.produced_fte || 0), [t('xls_fore_fte')]: parseFloat(row.forecast_fte || 0), [t('xls_fte_diff')]: parseFloat(row.produced_fte - row.forecast_fte), [t('xls_total_fee')]: parseFloat(row.total_fee || 0), [t('xls_fee_diff')]: parseFloat(row.fee_diff || 0)
                    }));
                } else if (reportLevel === 'channel') {
                    sheetName = "Kanal Ozeti";
                    exportData = filtered.map(row => ({
                        [t('xls_channel')]: row.channel_name, [t('xls_unit_price')]: row.unit_price, [t('xls_clean_hours')]: parseFloat(row.total_clean_hours || 0), [t('xls_prod_fte')]: parseFloat(row.produced_fte || 0), [t('xls_fore_fte')]: parseFloat(row.forecast_fte || 0), [t('xls_fte_diff')]: parseFloat(row.produced_fte - row.forecast_fte), [t('xls_total_fee')]: parseFloat(row.total_fee || 0), [t('xls_fee_diff')]: parseFloat(row.fee_diff || 0)
                    }));
                } else if (reportLevel === 'manager') {
                    sheetName = "Operasyon Yoneticisi Ozeti";
                    exportData = filtered.map(row => ({
                        [t('xls_om')]: row.manager_name, [t('xls_clean_hours')]: parseFloat(row.total_clean_hours || 0), [t('xls_prod_fte')]: parseFloat(row.produced_fte || 0), [t('xls_fore_fte')]: parseFloat(row.forecast_fte || 0), [t('xls_fte_diff')]: parseFloat(row.produced_fte - row.forecast_fte), [t('xls_total_fee')]: parseFloat(row.total_fee || 0), [t('xls_fee_diff')]: parseFloat(row.fee_diff || 0)
                    }));
                }
            }

            if (exportData.length === 0) { alert(t('no_data')); return; }

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.json_to_sheet(exportData);
            
            const numberColumns = [t('xls_clean_hours'), t('xls_prod_fte'), t('xls_fore_fte'), t('xls_fte_diff'), t('xls_raw_fte'), t('xls_fte')];
            const currencyColumns = [t('xls_total_fee'), t('xls_fee_diff'), t('xls_unit_price')];
            
            const range = XLSX.utils.decode_range(ws['!ref']);
            const currencyFmt = '"₺" #,##0'; 
            const numberFmt = '0.00'; 
            
            for (let C = range.s.c; C <= range.e.c; ++C) {
                const address = XLSX.utils.encode_cell({r: 0, c: C});
                if (!ws[address]) continue;
                
                const colName = ws[address].v;

                if (currencyColumns.includes(colName)) {
                    for (let R = 1; R <= range.e.r; ++R) {
                        const cellAddress = XLSX.utils.encode_cell({r: R, c: C});
                        if (!ws[cellAddress] || ws[cellAddress].t !== 'n') continue;
                        ws[cellAddress].z = currencyFmt;
                    }
                } else if (numberColumns.includes(colName)) {
                    for (let R = 1; R <= range.e.r; ++R) {
                        const cellAddress = XLSX.utils.encode_cell({r: R, c: C});
                        if (!ws[cellAddress] || ws[cellAddress].t !== 'n') continue;
                        ws[cellAddress].z = numberFmt;
                    }
                }
            }

            const wscols = Object.keys(exportData[0]).map(k => ({ wch: 20 }));
            ws['!cols'] = wscols;

            XLSX.utils.book_append_sheet(wb, ws, sheetName);
            const fileName = `Trendyol_${sheetName.replace(/ /g, '_')}_${selectedPeriod}.xlsx`;
            XLSX.writeFile(wb, fileName);
            closeExportModal();
        }
    </script>
